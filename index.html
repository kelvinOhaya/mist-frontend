<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- FIX: Cleaned up spacing so Safari parses viewport-fit correctly -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- FIX: Added media query context so Safari honors the ultra-dark color -->
    <meta
      name="theme-color"
      content="#070707"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="theme-color" content="#070707" />

    <!-- PWA Meta Tags -->
    <meta name="application-name" content="Mist Chat" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- Icons for different devices -->
    <link rel="apple-touch-icon" href="src/assets/cloudAppIcon.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="src/assets/cloudAppIcon.png"
    />
    <link rel="manifest" href="public/manifest.json" />
    <title>Mist</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
